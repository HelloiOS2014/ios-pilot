name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags "-X ios-pilot/internal/cli.Version=${VERSION}" \
            -o "ios-pilot-darwin-${{ matrix.goarch }}" \
            ./cmd/ios-pilot/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-pilot-darwin-${{ matrix.goarch }}
          path: ios-pilot-darwin-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/ios-pilot-darwin-amd64/ios-pilot-darwin-amd64 release/
          cp artifacts/ios-pilot-darwin-arm64/ios-pilot-darwin-arm64 release/
          cp skills/ios-pilot/SKILL.md release/
          chmod +x release/ios-pilot-darwin-*
          cd release && shasum -a 256 * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ios-pilot-darwin-amd64
            release/ios-pilot-darwin-arm64
            release/SKILL.md
            release/checksums.txt
          generate_release_notes: true
